version: "2"
run:
  timeout: 5m
  go: 1.26.3
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    exhaustruct:
      exclude:
        - os/exec.Cmd
    funlen:
      lines: 60
      statements: 40
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
    makezero:
      always: true
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    testifylint:
      disable:
        - go-require
      enable-all: true
    varnamelen:
      ignore-names:
        - w
        - r
        - v
        - e
        - s
        - i
        - fn
        - wg
        - ok
        - tt
        - tc
        - ln
        - bi
        - v1
  exclusions:
    generated: lax
    rules:
      - text: returns interface
        linters:
          - ireturn
      - path: _test\.go
        linters:
          - exhaustruct
          - testpackage
          - gochecknoglobals
          - funlen
          - cyclop
          - goconst
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - \.gen\.go$
      - _templ\.go$
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _templ\.go$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
