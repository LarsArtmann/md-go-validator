version: "2"
run:
    timeout: 5m
    go: 1.26.2
    build-tags:
        - goexperiment.arenas
        - goexperiment.goroutineleakprofile
        - goexperiment.jsonv2
        - goexperiment.runtimesecret
        - goexperiment.simd
    allow-parallel-runners: true
    allow-serial-runners: true
    tests: true
output:
    formats:
        text:
            path: stdout
linters:
    enable:
        - arangolint
        - asasalint
        - asciicheck
        - bidichk
        - bodyclose
        - canonicalheader
        - containedctx
        - contextcheck
        - copyloopvar
        - cyclop
        - decorder
        - dogsled
        - dupl
        - dupword
        - durationcheck
        - embeddedstructfieldcheck
        - err113
        - errcheck
        - errchkjson
        - errname
        - errorlint
        - exhaustive
        - exhaustruct
        - exptostd
        - fatcontext
        - forbidigo
        - forcetypeassert
        - funlen
        - ginkgolinter
        - gocheckcompilerdirectives
        - gochecknoglobals
        - gochecknoinits
        - gochecksumtype
        - gocognit
        - goconst
        - gocritic
        - gocyclo
        - godoclint
        - godot
        - godox
        - goheader
        - gomodguard_v2
        - goprintffuncname
        - gosec
        - gosmopolitan
        - govet
        - grouper
        - iface
        - importas
        - inamedparam
        - ineffassign
        - interfacebloat
        - intrange
        - iotamixing
        - ireturn
        - loggercheck
        - maintidx
        - makezero
        - mirror
        - misspell
        - mnd
        - modernize
        - musttag
        - nakedret
        - nestif
        - nilerr
        - nilnesserr
        - nilnil
        - nlreturn
        - noctx
        - noinlineerr
        - nolintlint
        - nonamedreturns
        - nosprintfhostport
        - paralleltest
        - perfsprint
        - prealloc
        - predeclared
        - promlinter
        - protogetter
        - reassign
        - recvcheck
        - revive
        - rowserrcheck
        - sloglint
        - spancheck
        - sqlclosecheck
        - staticcheck
        - tagalign
        - tagliatelle
        - testableexamples
        - testifylint
        - thelper
        - tparallel
        - unconvert
        - unparam
        - unqueryvet
        - unused
        - usestdlibvars
        - usetesting
        - varnamelen
        - wastedassign
        - whitespace
        - wrapcheck
        - wsl_v5
        - zerologlint
    settings:
        exhaustruct:
            exclude:
                - os/exec.Cmd
        funlen:
            lines: 60
            statements: 40
        gocritic:
            disabled-checks:
                - dupImport
                - ifElseChain
                - octalLiteral
                - whyNoLint
        ireturn:
            allow:
                - error
                - empty
                - anon
                - stdlib
                - generic
        varnamelen:
            ignore-names:
                - w
                - r
                - v
                - e
                - s
                - i
                - fn
                - wg
                - ok
                - tt
                - tc
                - ln
                - bi
                - v1
    exclusions:
        generated: lax
        rules:
            - text: returns interface
              linters:
                - ireturn
formatters:
    enable:
        - gci
        - goimports
        - gofumpt
        - golines
    exclusions:
        generated: lax
issues:
    max-issues-per-linter: 50
    max-same-issues: 10
