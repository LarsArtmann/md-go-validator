# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

project_name: md-go-validator

before:
  hooks:
    - go mod tidy

builds:
  - id: md-go-validator
    main: ./cmd/md-go-validator
    binary: md-go-validator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: 386
      - goos: windows
        goarch: arm64
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{- title .Os }}_{{- if eq .Arch "amd64" }}x86_64
        {{- else if eq .Arch "386" }}i386
        {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: all
    output: true

sboms:
  - artifacts: archive

nfpms:
  - id: default
    package_name: md-go-validator
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: "https://github.com/LarsArtmann/md-go-validator"
    description: "Multi-language code block validator for Markdown and MDX"
    license: MIT
    maintainer: "Lars Artmann <lars@larsartmann.com>"
    formats:
      - deb
      - rpm
      - apk

scoops:
  - name: md-go-validator
    skip_upload: true
    repository:
      owner: LarsArtmann
      name: homebrew-tap
    directory: Scoop
    commit_author:
      name: goreleaserbot
      email: goreleaser@larsartmann.com
    homepage: "https://github.com/LarsArtmann/md-go-validator"
    description: "Multi-language code block validator for Markdown and MDX"
    license: MIT

release:
  github:
    owner: LarsArtmann
    name: md-go-validator
  draft: false
  prerelease: auto
  name_template: "md-go-validator v{{.Version}}"
