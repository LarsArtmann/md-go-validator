name: "md-go-validator"
description: "Validate code blocks in Markdown and MDX documentation files"
branding:
  icon: "check-square"
  color: "blue"

inputs:
  path:
    description: "Path to validate (file or directory)"
    required: false
    default: "."
  args:
    description: "Additional arguments to pass to md-go-validator (see --help)"
    required: false
    default: ""

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.path }}
  entrypoint:
    - sh
    - -c
    - |
      md-go-validator ${{ inputs.args }} "$0"
